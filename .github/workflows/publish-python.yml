name: Publish Python

# Trigger: tag push python/v* — publishes theveil to PyPI via OIDC
# trusted publisher. Configure the trusted publisher on PyPI to point at
# this repository + this workflow + the `pypi` environment before the
# first tag, otherwise publish will fail-closed.

on:
  push:
    tags:
      - 'python/v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for PyPI trusted publishing (OIDC)
      contents: read
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
