name: Publish Go

# Trigger: tag push go/v* — registers the Go module on proxy.golang.org.
#
# Dual-tag mechanism:
#   - v0.1.0       — canonical version tag consumed by TS (npm) + Python (PyPI)
#   - go/v0.1.0    — Go submodule tag on the same commit; required because the Go
#                    module lives under the go/ subdirectory of this monorepo.
#   Both tags MUST point at the same commit so version parity holds across
#   languages.
#
# Publishing a Go module = pushing the go/v* tag and pinging proxy.golang.org
# so the module + version are cached on the module proxy. No registry
# credentials needed.

on:
  push:
    tags:
      - 'go/v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.22'
      - name: Verify module builds
        working-directory: go
        run: go build ./...
      - name: Run tests
        working-directory: go
        run: go test ./... -count=1
      - name: Warm proxy.golang.org
        run: |
          TAG="${GITHUB_REF_NAME#go/}"
          curl -fsSL "https://proxy.golang.org/github.com/declade/theveil-sdks/go/@v/${TAG}.info"
