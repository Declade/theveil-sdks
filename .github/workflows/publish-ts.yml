name: Publish TypeScript

# Trigger: tag push ts-v* — publishes @lucairn/sdk to npm via OIDC
# trusted publisher (configured on npmjs.com against this repo + this
# workflow filename). No NPM_TOKEN secret — the publish step authenticates
# via the GitHub Actions OIDC token, which npm matches against the
# trusted-publisher registration.
#
# Stage 3 rebrand: package was @dsaveil/theveil@0.2.0; the new scope is
# @lucairn/sdk and the first published version is 1.0.0 (tag ts-v1.0.0).
# OIDC trusted-publisher registration on npmjs.com must reference the
# @lucairn scope before the first publish — see the Path A handover
# (specs/handover-path-a-stage-3-sdk-rebrand-2026-05-02.md, Gate 1).
#
# Provenance attestation is added automatically by npm when publishing
# via trusted publisher; do NOT pass --provenance on the CLI (it's
# auto-enabled and passing it explicitly with OIDC creates confusing
# dual-attestation behaviour).

on:
  push:
    tags:
      - 'ts-v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for npm trusted publisher (OIDC)
      contents: read
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - name: Upgrade npm (pinned; OIDC support requires >=11.5.1)
        run: npm install -g npm@11.12.1
      - name: Install dependencies
        run: npm ci
      - name: Verify dependency signatures
        run: npm audit signatures
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test
      - name: Publish to npm
        run: npm publish --access public
